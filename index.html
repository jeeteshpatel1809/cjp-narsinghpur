<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कॉकरोच जनता पार्टी - आधिकारिक जिला कार्यालय: नरसिंहपुर</title>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        /* 🖼️ इंटरनेट वाले लिंक से परमानेंट बैकग्राउंड सेट कर दिया है भैया */
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: url('https://images2.imgbox.com/60/a6/6qY0mZ1l_o.jpg') no-repeat center center fixed !important; 
            background-size: cover !important; 
            color: #111; 
        }
        
        header { 
            background: linear-gradient(135deg, rgba(13, 35, 58, 0.95) 0%, rgba(6, 19, 36, 0.95) 100%); 
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 5px solid #ffcc00; 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .header-logo { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: 3px solid #ffcc00; 
            object-fit: cover; 
            background-color: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .container { max-width: 750px; margin: 30px auto; padding: 10px; }
        .counter-box, .section { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(12px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.5); margin-bottom: 25px; padding: 25px; }
        .counter-number { color: #cc0000; font-size: 30px; font-weight: 900; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { background: linear-gradient(135deg, #0d233a 0%, #1a3a5c 100%); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; }
        .admin-zone { display: none; background: #fff5f5; border: 2px dashed #d9534f; padding: 20px; border-radius: 12px; }
        .item-card { background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 6px; margin-bottom: 10px; border-left: 5px solid #ffcc00; }
    </style>
</head>
<body>

<header id="mainHeader" onclick="handleHeaderClick()">
    <!-- लीडर वाली फोटो जो आपकी आ रही थी, उसे गिटहब से ही रखा है -->
    <img id="partyLogo" class="header-logo" src="./cjp-leader.jpg" alt="CJP Logo">
    <h1>कॉकरोच जनता पार्टी (CJP)</h1>
    <p>आधिकारिक जिला कार्यालय: नरसिंहपुर (म.प्र.)</p>
</header>

<div class="container">
    <div class="counter-box">कुल सक्रिय सदस्य: <span class="counter-number" id="memberCount">2</span></div>

    <div class="section">
        <h3>📋 सदस्यता फॉर्म</h3>
        <input type="text" id="memberName" placeholder="आपका नाम">
        <input type="text" id="memberVillage" placeholder="गाँव/शहर">
        <input type="text" id="memberTehsil" placeholder="तहसील">
        <input type="tel" id="memberPhone" placeholder="मोबाइल नंबर">
        <button onclick="registerDirectly()">सदस्यता लें (Direct Register)</button>
    </div>

    <div class="section">
        <h3>👥 नए जुड़े सदस्य</h3>
        <div id="membersList">
            <div class="item-card"><strong>रामेश्वर दीक्षित (सालीचौका):</strong> सदस्य बने।</div>
            <div class="item-card"><strong>संदीप पटेल (सिहोरा):</strong> सदस्य बने।</div>
        </div>
    </div>

    <div class="section admin-zone" id="adminPanel">
        <h3 style="color: #d9534f;">🔐 बड़े भैया का स्पेशल कंट्रोल पैनल</h3>
        <button onclick="hideAdminPanel()" style="background:#6c757d;">पैनल छुपाएं 🔒</button>
    </div>
</div>

<script>
    let count = 2;
    function handleHeaderClick() {
        let clicks = sessionStorage.getItem('clicks') || 0;
        clicks++;
        sessionStorage.setItem('clicks', clicks);
        if (clicks >= 3) {
            let password = prompt("🔐 बड़े भैया, कृपया अपना गुप्त पासकोड दर्ज करें:");
            if (password === "1809") {
                document.getElementById("adminPanel").style.display = "block";
                sessionStorage.setItem('clicks', 0);
            } else {
                sessionStorage.setItem('clicks', 0);
            }
        }
    }
    function hideAdminPanel() { document.getElementById("adminPanel").style.display = "none"; }
    
    function registerDirectly() {
        let name = document.getElementById("memberName").value.trim();
        if (name === "") { alert("भैया! नाम तो लिखिए!"); return; }
        count++;
        document.getElementById("memberCount").innerText = count;
        let list = document.getElementById("membersList");
        let newItem = document.createElement("div");
        newItem.className = "item-card";
        newItem.innerHTML = `<strong>${name}:</strong> सदस्य बने।`;
        list.insertBefore(newItem, list.firstChild);
        alert("बधाई हो भैया! डिजिटल सदस्यता पक्की हो गई!");
    }
</script>
</body>
</html>
