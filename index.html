<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कॉकरोच जनता पार्टी - आधिकारिक जिला कार्यालय: नरसिंहपुर</title>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; 
            background: #0d233a url('cjp-bg.jpg') no-repeat center center fixed !important; 
            background-size: cover !important; 
            color: #fff; 
        }
        
        /* सदस्यता फॉर्म वाला पैनल (अब अधिक पारदर्शी) */
        .registration-section { 
            background: rgba(255, 255, 255, 0.05); /* बहुत हल्का पारदर्शी */
            backdrop-filter: blur(8px) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px; margin-bottom: 25px; padding: 25px;
        }

        /* इनपुट फील्ड्स (अब और ज्यादा स्पष्ट) */
        input[type="text"], input[type="tel"], textarea { 
            width: 100%; padding: 15px; margin: 10px 0 20px 0; 
            border: 2px solid #ffcc00; /* बॉर्डर उभारा गया */
            border-radius: 10px; font-size: 18px; font-weight: bold;
            background: rgba(255, 255, 255, 0.95); /* अंदर का हिस्सा साफ */
            color: #000; /* टेक्स्ट काला रखा ताकि पढ़ने में आए */
        }

        /* प्लेसहोल्डर को गहरा किया */
        ::placeholder { color: #333; font-weight: bold; opacity: 1; }

        .container { max-width: 750px; margin: 30px auto; padding: 10px; }
        .counter-box { background: rgba(255, 255, 255, 0.15); padding: 25px; border-radius: 15px; margin-bottom: 25px; text-align: center; }
        .counter-number { color: #ffcc00; font-size: 35px; font-weight: 900; }
        
        button { 
            background: #ffcc00; color: #0d233a; border: none; padding: 15px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; 
        }
        
        .section { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .item-card { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #ffcc00; }
    </style>
</head>
<body>

<div class="container">
    <div class="counter-box">कुल सक्रिय सदस्य: <span class="counter-number" id="memberCount">2</span></div>

    <!-- अपडेटेड सदस्यता फॉर्म -->
    <div class="registration-section">
        <h3>📋 सदस्यता फॉर्म</h3>
        <input type="text" id="memberName" placeholder="अपना नाम यहाँ लिखें">
        <input type="text" id="memberVillage" placeholder="गाँव/शहर का नाम भरें">
        <input type="text" id="memberTehsil" placeholder="तहसील का नाम भरें">
        <input type="tel" id="memberPhone" placeholder="मोबाइल नंबर दर्ज करें">
        <button onclick="registerDirectly()">सदस्यता लें</button>
    </div>

    <!-- अन्य सेक्शन्स... -->
</div>
<!-- बाकी स्क्रिप्ट वही है -->
</body>
</html>
