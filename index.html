<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कॉकरोच जनता पार्टी - आधिकारिक जिला कार्यालय: नरसिंहपुर</title>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background: #0d233a url('cjp-bg.jpg') no-repeat center center fixed !important; background-size: cover !important; color: #fff; }
        header { background: rgba(0, 0, 0, 0.2); color: white; padding: 40px 20px; text-align: center; border-bottom: 2px solid rgba(255, 204, 0, 0.5); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .header-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ffcc00; object-fit: cover; background-color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .container { max-width: 750px; margin: 30px auto; padding: 10px; }
        .counter-box, .section { background: rgba(255, 255, 255, 0.05) !important; backdrop-filter: blur(12px) !important; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 25px; padding: 25px; color: #fff; }
        .counter-number { color: #ffcc00; font-size: 35px; font-weight: 900; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; font-size: 16px; background: rgba(255, 255, 255, 0.15); color: white; }
        button { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
        .del-btn { background: #d9534f; color: white; border: none; padding: 5px 10px; margin-left: 10px; cursor: pointer; border-radius: 4px; }
        .admin-zone { display: none; border: 2px dashed #d9534f; padding: 20px; border-radius: 12px; background: rgba(217, 83, 79, 0.3); }
        .admin-list { margin-top: 15px; border-top: 1px solid #fff; padding-top: 10px; }
    </style>
</head>
<body>

<header id="mainHeader" onclick="handleHeaderClick()">
    <img id="partyLogo" class="header-logo" src="cjp-leader.jpg" alt="CJP Logo">
    <h1>कॉकरोच जनता पार्टी (CJP)</h1>
    <p>आधिकारिक जिला कार्यालय: नरसिंहपुर (म.प्र.)</p>
</header>

<div class="container">
    <div class="counter-box">कुल सक्रिय सदस्य: <span class="counter-number" id="memberCount">2</span></div>

    <!-- फॉर्म्स जैसे थे वैसे ही रहेंगे -->
    <div class="section">
        <h3>📋 सदस्यता फॉर्म</h3>
        <input type="text" id="memberName" placeholder="आपका नाम">
        <input type="text" id="memberVillage" placeholder="गाँव/शहर">
        <button onclick="register()">सदस्यता लें</button>
    </div>

    <div class="section" id="publicComments">
        <h3>💬 जनता के सुझाव</h3>
        <div id="commentsList">
            <div id="c1"><strong>दीपक:</strong> बहुत बढ़िया!</div>
        </div>
    </div>

    <div class="section" id="publicMembers">
        <h3>👥 सक्रिय सदस्य</h3>
        <div id="membersList">
            <div id="m1"><strong>रामेश्वर:</strong> सदस्य बने।</div>
        </div>
    </div>

    <!-- 🔐 बड़े भैया का सीक्रेट पैनल -->
    <div class="section admin-zone" id="adminPanel">
        <h3 style="color: #ffcccc;">🔐 बड़े भैया का कंट्रोल पैनल</h3>
        <div class="admin-list">
            <h4>सदस्य हटाएँ:</h4>
            <div id="adminMembersList"></div>
        </div>
        <div class="admin-list">
            <h4>कमेंट हटाएँ:</h4>
            <div id="adminCommentsList"></div>
        </div>
        <br>
        <button onclick="hideAdminPanel()" style="background:rgba(200,0,0,0.6);">पैनल बंद करें 🔒</button>
    </div>
</div>

<script>
    function handleHeaderClick() {
        if (prompt("पासकोड:") === "1809") {
            document.getElementById("adminPanel").style.display = "block";
            refreshAdminView();
        }
    }
    function hideAdminPanel() { document.getElementById("adminPanel").style.display = "none"; }

    function register() {
        let name = document.getElementById("memberName").value;
        let list = document.getElementById("membersList");
        let div = document.createElement("div");
        div.id = "m" + Date.now();
        div.innerHTML = `<strong>${name}:</strong> सदस्य बने।`;
        list.appendChild(div);
        refreshAdminView();
    }

    function refreshAdminView() {
        document.getElementById("adminMembersList").innerHTML = document.getElementById("membersList").innerHTML 
            + '<button class="del-btn" onclick="this.previousSibling.remove()">❌ हटाएँ</button>';
        document.getElementById("adminCommentsList").innerHTML = document.getElementById("commentsList").innerHTML 
            + '<button class="del-btn" onclick="this.previousSibling.remove()">❌ हटाएँ</button>';
    }
</script>
</body>
</html>
