<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #0d233a; /* डार्क बैकग्राउंड */
            color: #fff; 
            padding: 20px;
        }

        /* यह है वो सदस्यता वाला मुख्य पैनल */
        .registration-section { 
            background: rgba(255, 255, 255, 0.05); /* बहुत ज्यादा पारदर्शी */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px; 
            padding: 30px;
            margin-bottom: 25px;
        }

        /* इनपुट बॉक्स - इन्हें पूरी तरह से ओपेक (Opaque/Solid) किया है ताकि साफ दिखे */
        input[type="text"], input[type="tel"], textarea { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0 20px 0; 
            border: 3px solid #fff; /* सफेद मोटा बॉर्डर */
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold;
            background-color: #ffffff !important; /* पूरा सफेद बैकग्राउंड */
            color: #000000 !important; /* काला टेक्स्ट ताकि साफ़ दिखे */
        }

        /* प्लेसहोल्डर (जो लिखा रहता है) उसे काला और गहरा किया */
        ::placeholder { 
            color: #333333 !important; 
            font-weight: 900 !important; 
            opacity: 1 !important; 
        }

        button { 
            background: #ffcc00; 
            color: #000; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            width: 100%; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="registration-section">
        <h3 style="color: #ffcc00;">📋 सदस्यता फॉर्म</h3>
        
        <input type="text" id="memberName" placeholder="अपना नाम भरें">
        <input type="text" id="memberVillage" placeholder="गाँव/शहर का नाम भरें">
        <input type="text" id="memberTehsil" placeholder="तहसील भरें">
        <input type="tel" id="memberPhone" placeholder="मोबाइल नंबर लिखें">
        
        <button onclick="registerDirectly()">सदस्यता लें</button>
    </div>

</body>
</html>
